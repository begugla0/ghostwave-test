services:
  panel:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghostwave-panel:latest
    container_name: ghostwave-panel
    restart: unless-stopped
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      JWT_SECRET: "${JWT_SECRET}"
      SECRET_KEY: "${SECRET_KEY}"
      NODE_API_KEY: "${NODE_API_KEY}"
      ADMIN_USERNAME: "${ADMIN_USERNAME}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_ADMIN_IDS: "${TELEGRAM_ADMIN_IDS}"
      SUB_BASE_URL: "${SUB_BASE_URL}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ghostwave-net

  postgres:
    image: postgres:16-alpine
    container_name: ghostwave-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ghostwave
      POSTGRES_USER: ghostwave
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ghostwave-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghostwave"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ghostwave-redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    networks:
      - ghostwave-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: ghostwave-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - ghostwave-net
    depends_on:
      - panel

volumes:
  postgres-data:
  caddy-data:
  caddy-config:

networks:
  ghostwave-net:
    driver: bridge

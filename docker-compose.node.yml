services:
  node-agent:
    build:
      context: .
      dockerfile: Dockerfile.node
    image: ghostwave-node:latest
    container_name: ghostwave-node
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    environment:
      NODE_ID:                  "${NODE_ID}"
      NODE_API_KEY:             "${NODE_API_KEY}"
      PANEL_URL:                "${PANEL_URL}"
      AGENT_PORT:               "${AGENT_PORT:-2095}"
      AGENT_HOST:               "0.0.0.0"
      GHOSTNET_PORT:            "${GHOSTNET_PORT:-443}"
      GHOSTNET_DOMAIN:          "${GHOSTNET_DOMAIN}"
      GHOSTNET_SECRET:          "${GHOSTNET_SECRET}"
      HEARTBEAT_INTERVAL:       "15"
      TRAFFIC_REPORT_INTERVAL:  "60"
    volumes:
      - /etc/ghostnet:/etc/ghostnet

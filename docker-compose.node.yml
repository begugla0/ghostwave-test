version: "3.9"

# Запускается на каждом VPN-сервере отдельно
services:
  node-agent:
    image: ghostwave-node:latest
    build:
      context: ../node
      dockerfile: ../docker/Dockerfile.node
    container_name: ghostwave-node
    restart: unless-stopped
    network_mode: host   # нужен для TUN интерфейса и прямого доступа к портам
    cap_add:
      - NET_ADMIN        # нужен для TUN/iptables
    devices:
      - /dev/net/tun     # TUN устройство
    environment:
      - NODE_ID=${NODE_ID:-1}
      - NODE_API_KEY=${NODE_API_KEY}
      - PANEL_URL=${PANEL_URL}
      - AGENT_PORT=${AGENT_PORT:-2095}
      - GHOSTNET_PORT=${GHOSTNET_PORT:-443}
      - GHOSTNET_DOMAIN=${GHOSTNET_DOMAIN}
      - GHOSTNET_SECRET=${GHOSTNET_SECRET}
    volumes:
      - /etc/ghostnet:/etc/ghostnet
      - node-logs:/app/logs

volumes:
  node-logs:
